<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LMP Compile</title>
  <style>
    body { font-family: system-ui; padding: 20px; margin: 0; font-size: 14px; background: #1e1e1e; color: #e8eaed; display: flex; align-items: center; justify-content: center; min-height: 100px; }
  </style>
</head>
<body>
  <span id="msg">Loading compiler...</span>
  <script src="https://cdn.jsdelivr.net/gh/zunaidFarouque/LMP-Specification@main/compiler-js/dist/lmp-core.v1.iife.min.js" onload="init()"></script>
  <script>
    function init() {
      var msg = document.getElementById('msg');
      function run(lmpText, filename) {
        try {
          msg.textContent = 'Compiling...';
          var r = LMP.compile(lmpText, { loose: true });
          var m = r.midi || r;
          var b = new Blob([m], { type: 'audio/midi' });
          var a = document.createElement('a');
          a.href = URL.createObjectURL(b);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
          msg.textContent = 'Done';
          if (window.opener) window.opener.focus();
          setTimeout(window.close, 300);
        } catch (e) {
          msg.textContent = 'Error: ' + e.message;
        }
      }
      window.addEventListener('message', function(e) {
        if (e.origin !== 'https://gemini.google.com') return;
        if (e.data && e.data.type === 'lmp-compile' && e.data.lmpText != null && e.data.filename) {
          run(e.data.lmpText, e.data.filename);
        }
      });
      msg.textContent = 'Waiting for data...';
      if (window.opener) window.opener.postMessage({ type: 'lmp-ready' }, 'https://gemini.google.com');
    }
  </script>
</body>
</html>
