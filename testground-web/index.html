<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMP Testground — Lean Musical Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-[#0f1419] text-slate-100 min-h-screen font-sans antialiased">
  <!-- Loader: shown when LMP lib not ready (file://) -->
  <div id="loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-[#0f1419]/95">
    <div class="text-center max-w-md px-6">
      <h1 class="text-2xl font-bold mb-4">LMP Testground</h1>
      <p class="text-slate-400 mb-6">Load the LMP library to get started. Select <code class="bg-slate-800 px-1.5 py-0.5 rounded text-sm">lmp-core.v1.iife.min.js</code></p>
      <input type="file" id="libInput" accept=".js" class="hidden">
      <button id="loadBtn" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold px-6 py-3 rounded-lg transition-colors">Load LMP library</button>
      <p class="mt-4 text-sm text-slate-500"><a href="#" id="clearCache" class="text-slate-400 hover:text-slate-300">Clear cache</a></p>
    </div>
  </div>

  <div id="app" class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-[#0f1419]/80 backdrop-blur">
      <h1 class="text-lg font-bold tracking-tight">LMP Testground</h1>
      <div class="flex items-center gap-3">
        <select id="examples" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500">
          <option value="">Examples</option>
          <option value="minimal">Minimal</option>
          <option value="chords">Piano + Flute</option>
          <option value="drums">Drums</option>
        </select>
        <button id="downloadBtn" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold px-4 py-2 rounded-lg text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Download MIDI</button>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col lg:flex-row min-h-0">
      <!-- Editor Panel -->
      <section class="flex flex-col min-h-[300px] lg:min-h-0 lg:w-1/2 border-b lg:border-b-0 lg:border-r border-slate-800">
        <div class="flex items-center justify-between px-4 py-2 border-b border-slate-800 bg-slate-900/50">
          <label class="text-sm font-medium text-slate-400">LMP Source</label>
        </div>
        <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
          <textarea id="lmp" class="flex-1 w-full min-h-[200px] p-4 bg-slate-900/50 font-mono text-sm resize-none focus:outline-none focus:ring-0" placeholder="Paste or write LMP here..." spellcheck="false"></textarea>
          <div id="status" class="px-4 py-2 text-sm min-h-[2.5rem] border-t border-slate-800 bg-slate-900/30"></div>
        </div>
      </section>

      <!-- Preview Panel -->
      <section class="flex flex-col flex-1 min-h-[300px] lg:min-h-0 relative">
        <div class="flex items-center justify-between px-4 py-2 border-b border-slate-800 bg-slate-900/50 gap-2 flex-wrap">
          <label class="text-sm font-medium text-slate-400">MIDI Preview</label>
          <div class="flex items-center gap-2">
            <input type="file" id="drumMapInput" accept=".drm" class="hidden">
            <button id="loadDrumMapBtn" type="button" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm px-3 py-1.5 rounded-lg transition-colors">Load drum map</button>
            <span id="drumMapLabel" class="text-xs text-slate-500">GM (default)</span>
          </div>
        </div>
        <div id="previewContainer" class="flex-1 overflow-auto bg-slate-900/30 relative">
          <div id="dropzone" class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 border-2 border-dashed border-slate-700 rounded-lg m-2 transition-opacity" aria-hidden="true">
            <p class="text-slate-500 text-sm">Drop .mid file here to decompile to LMP</p>
          </div>
          <div id="pianoRollContainer" class="p-4 min-h-full">
            <div id="pianoRollPlaceholder" class="flex items-center justify-center h-48 text-slate-500 text-sm">Compile LMP to see piano roll</div>
            <svg id="pianoRollSvg" class="hidden" style="max-width: 100%;"></svg>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="lib/lmp-core.v1.iife.min.js" onerror="document.getElementById('loader').classList.remove('hidden')"></script>
  <script src="assets/js/drum-map.js"></script>
  <script src="assets/js/piano-roll.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
