<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LMP API — Compile & Decompile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f1419; --fg: #e2e8f0; --muted: #94a3b8; --accent: #f59e0b; --card: #1e293b; --err: #ef4444; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; min-height: 100vh; padding: 2rem 1.5rem; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .tagline { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    a { color: var(--accent); }
    a:hover { text-decoration: underline; }
    .back { display: inline-block; margin-bottom: 1rem; }
    #msg { margin: 1rem 0; padding: 0.75rem; border-radius: 8px; background: var(--card); }
    #msg.error { background: rgba(239,68,68,0.15); color: var(--err); }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-weight: 500; display: block; margin-bottom: 0.25rem; }
    textarea { width: 100%; min-height: 120px; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 0.75rem; border-radius: 8px; background: var(--card); border: 1px solid #334155; color: var(--fg); resize: vertical; }
    input[type="text"], input[type="number"] { padding: 0.5rem 0.75rem; border-radius: 6px; background: var(--card); border: 1px solid #334155; color: var(--fg); }
    input[type="file"] { padding: 0.5rem 0; }
    .row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .row label { margin: 0; }
    button { padding: 0.5rem 1rem; background: var(--accent); color: #1e293b; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { background: #fbbf24; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button { background: var(--card); color: var(--fg); }
    .tabs button.active { background: var(--accent); color: #1e293b; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/LMP-Specification/" class="back">← Home</a>
    <h1>LMP API</h1>
    <p class="tagline">Compile LMP → MIDI or decompile MIDI → LMP. All processing runs in your browser.</p>
    <div id="msg" role="status" aria-live="polite"></div>
    <div id="formArea" style="display:none">
      <div class="tabs">
        <button type="button" id="tabL2M" class="active">LMP → MIDI</button>
        <button type="button" id="tabM2L">MIDI → LMP</button>
      </div>
      <div id="panelL2M" class="panel active">
        <form id="formL2M">
          <label for="lmpText">LMP text</label>
          <textarea id="lmpText" placeholder="@LMP 1.0&#10;@TRACK 1 Melody&#10;@CHANNEL 1&#10;..."></textarea>
          <label for="filenameMid">Output filename (optional)</label>
          <input type="text" id="filenameMid" placeholder="output.mid">
          <div class="row">
            <input type="checkbox" id="loose" checked>
            <label for="loose">Loose mode (recover from minor violations)</label>
          </div>
          <button type="submit">Compile &amp; Download</button>
        </form>
      </div>
      <div id="panelM2L" class="panel">
        <form id="formM2L">
          <label for="midiFile">MIDI file</label>
          <input type="file" id="midiFile" accept=".mid,.midi,audio/midi,audio/mid">
          <label for="filenameLmp">Output filename (optional)</label>
          <input type="text" id="filenameLmp" placeholder="output.lmp">
          <div class="row">
            <input type="checkbox" id="preferSpn" checked>
            <label for="preferSpn">Use note names (SPN) where possible</label>
          </div>
          <div class="row">
            <label for="precision">Beat precision (decimals)</label>
            <input type="number" id="precision" min="1" max="6" value="3">
          </div>
          <button type="submit">Decompile &amp; Download</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/zunaidFarouque/LMP-Specification@main/compiler-js/dist/lmp-core.v1.iife.min.js" onload="init()"></script>
  <script>
    function parseHash() {
      var h = location.hash.slice(1);
      if (!h) return null;
      var out = {};
      h.split('&').forEach(function(pair) {
        var i = pair.indexOf('=');
        if (i === -1) return;
        var k = decodeURIComponent(pair.slice(0, i).replace(/\+/g, ' '));
        var v = decodeURIComponent(pair.slice(i + 1));
        out[k] = v;
      });
      return out;
    }

    function base64ToUtf8(b64) {
      try {
        return decodeURIComponent(escape(atob(b64)));
      } catch (e) {
        throw new Error('Invalid base64 or encoding for LMP text');
      }
    }

    function base64ToBytes(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function utf8ToBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function setMsg(text, isError) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = isError ? 'error' : '';
    }

    function downloadBlob(blob, filename) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'output';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function runFromHash(params) {
      var dir = (params.dir || '').toLowerCase();
      var closeAfter = params.close === '1' || params.close === 'true';
      var filename = params.filename || '';

      if (dir === 'lmp2midi' && params.lmp != null) {
        var lmpText = base64ToUtf8(params.lmp);
        var loose = params.loose === '1' || params.loose === 'true';
        var r = window.LMP.compile(lmpText, { loose: loose });
        var midi = r.midi || r;
        var blob = new Blob([midi], { type: 'audio/midi' });
        downloadBlob(blob, filename || 'output.mid');
        setMsg('Download started.');
        if (closeAfter && (window.opener || window.history.length <= 1)) setTimeout(window.close, 300);
        return true;
      }

      if (dir === 'midi2lmp' && params.midi != null) {
        var bytes = base64ToBytes(params.midi);
        var preferSpn = params.preferSpn !== '0' && params.preferSpn !== 'false';
        var precision = parseInt(params.precision, 10);
        if (isNaN(precision) || precision < 1) precision = 3;
        var lmpStr = window.LMP.decompile(bytes, { preferSpn: preferSpn, precision: precision });
        var blob = new Blob([lmpStr], { type: 'text/plain' });
        downloadBlob(blob, filename || 'output.lmp');
        setMsg('Download started.');
        if (closeAfter && (window.opener || window.history.length <= 1)) setTimeout(window.close, 300);
        return true;
      }

      return false;
    }

    function init() {
      var params = parseHash();
      if (params && Object.keys(params).length > 0) {
        try {
          if (runFromHash(params)) {
            document.getElementById('formArea').style.display = 'none';
            return;
          }
        } catch (e) {
          setMsg('Error: ' + (e && e.message ? e.message : String(e)), true);
        }
      }

      document.getElementById('formArea').style.display = 'block';
      setMsg('');

      document.getElementById('tabL2M').onclick = function() {
        document.getElementById('tabL2M').classList.add('active');
        document.getElementById('tabM2L').classList.remove('active');
        document.getElementById('panelL2M').classList.add('active');
        document.getElementById('panelM2L').classList.remove('active');
      };
      document.getElementById('tabM2L').onclick = function() {
        document.getElementById('tabM2L').classList.add('active');
        document.getElementById('tabL2M').classList.remove('active');
        document.getElementById('panelM2L').classList.add('active');
        document.getElementById('panelL2M').classList.remove('active');
      };

      document.getElementById('formL2M').onsubmit = function(e) {
        e.preventDefault();
        var text = document.getElementById('lmpText').value.trim();
        if (!text) { setMsg('Paste LMP text first.', true); return; }
        var filename = (document.getElementById('filenameMid').value || 'output.mid').trim() || 'output.mid';
        var loose = document.getElementById('loose').checked;
        try {
          var r = window.LMP.compile(text, { loose: loose });
          var midi = r.midi || r;
          var blob = new Blob([midi], { type: 'audio/midi' });
          downloadBlob(blob, filename);
          setMsg('Download started.');
        } catch (err) {
          setMsg('Error: ' + (err && err.message ? err.message : String(err)), true);
        }
      };

      document.getElementById('formM2L').onsubmit = function(e) {
        e.preventDefault();
        var fileInput = document.getElementById('midiFile');
        if (!fileInput.files || !fileInput.files[0]) { setMsg('Choose a MIDI file first.', true); return; }
        var filename = (document.getElementById('filenameLmp').value || 'output.lmp').trim() || 'output.lmp';
        var preferSpn = document.getElementById('preferSpn').checked;
        var precision = parseInt(document.getElementById('precision').value, 10) || 3;
        var fr = new FileReader();
        fr.onload = function() {
          try {
            var bytes = new Uint8Array(fr.result);
            var lmpStr = window.LMP.decompile(bytes, { preferSpn: preferSpn, precision: precision });
            var blob = new Blob([lmpStr], { type: 'text/plain' });
            downloadBlob(blob, filename);
            setMsg('Download started.');
          } catch (err) {
            setMsg('Error: ' + (err && err.message ? err.message : String(err)), true);
          }
        };
        fr.readAsArrayBuffer(fileInput.files[0]);
      };
    }
  </script>
</body>
</html>
